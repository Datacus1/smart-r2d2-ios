name: Build unsigned iOS IPA

on:
  workflow_dispatch:
  push:
    paths:
      - "SmartR2D2iOS/**"
      - ".github/workflows/build-ios-unsigned-ipa.yml"

jobs:
  build:
    name: Build unsigned IPA
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build app without signing
        run: |
          set -euo pipefail
          set +e
          xcodebuild \
            -project SmartR2D2iOS/SmartR2D2iOS.xcodeproj \
            -scheme SmartR2D2iOS \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build 2>&1 | tee xcodebuild.log
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            grep -E "error:|ContentView.swift|SwiftCompile|SwiftEmitModule" xcodebuild.log | tail -n 80 | while IFS= read -r line; do
              echo "::error::$line"
            done
          fi
          exit "$status"

      - name: Package unsigned IPA
        run: |
          set -euo pipefail
          APP_PATH="$(find build/Build/Products/Release-iphoneos -maxdepth 1 -name '*.app' -type d | head -n 1)"
          test -n "$APP_PATH"
          rm -rf Payload SmartR2D2iOS-unsigned.ipa
          mkdir Payload
          cp -R "$APP_PATH" Payload/
          /usr/bin/zip -qry SmartR2D2iOS-unsigned.ipa Payload
          ls -lh SmartR2D2iOS-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartR2D2iOS-unsigned-ipa
          path: SmartR2D2iOS-unsigned.ipa
